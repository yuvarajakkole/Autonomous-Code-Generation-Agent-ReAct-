<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #loading { display: none; }
        #error { color: red; }
        #success { color: green; }
        .note-item { margin-bottom: 10px; }
        .note-actions { margin-left: 10px; }
        input { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Notes</h1>
    <div id="loading">Loading...</div>
    <div id="error"></div>
    <div id="success"></div>
    <ul id="notes-list"></ul>
    <h2>Add Note</h2>
    <input type="text" id="new-note-title" placeholder="Title" />
    <input type="text" id="new-note-content" placeholder="Content" />
    <button id="add-note-button">Add Note</button>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('add-note-button').addEventListener('click', addNote);
            fetchNotes();
        });

        // Fetch all notes from the server
        async function fetchNotes() {
            toggleLoading(true);
            clearMessages();
            try {
                const response = await fetch('/notes');
                if (!response.ok) throw new Error('Failed to fetch notes');
                const data = await response.json();
                renderNotes(data.notes);
            } catch (error) {
                showError(`Error fetching notes: ${error.message}`);
            } finally {
                toggleLoading(false);
            }
        }

        // Render notes to the UI
        function renderNotes(notes) {
            const notesList = document.getElementById('notes-list');
            notesList.innerHTML = '';
            notes.forEach(note => {
                const li = document.createElement('li');
                li.className = 'note-item';
                li.textContent = `${note.title}: ${note.content}`;
                const updateButton = document.createElement('button');
                updateButton.textContent = 'Update';
                updateButton.className = 'note-actions';
                updateButton.addEventListener('click', () => updateNotePrompt(note.id));
                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Delete';
                deleteButton.className = 'note-actions';
                deleteButton.addEventListener('click', () => deleteNotePrompt(note.id));
                li.appendChild(updateButton);
                li.appendChild(deleteButton);
                notesList.appendChild(li);
            });
        }

        // Add a new note
        async function addNote() {
            const title = document.getElementById('new-note-title').value.trim();
            const content = document.getElementById('new-note-content').value.trim();
            if (!title || !content) {
                showError('Title and content cannot be empty');
                return;
            }
            try {
                const response = await fetch('/notes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });
                if (!response.ok) throw new Error('Failed to add note');
                showSuccess('Note added successfully');
                fetchNotes();
            } catch (error) {
                showError(`Error adding note: ${error.message}`);
            }
        }

        // Prompt user to update a note
        async function updateNotePrompt(id) {
            const newTitle = prompt('Enter new title:').trim();
            const newContent = prompt('Enter new content:').trim();
            if (!newTitle || !newContent) {
                showError('Title and content cannot be empty');
                return;
            }
            updateNote(id, newTitle, newContent);
        }

        // Update a note
        async function updateNote(id, title, content) {
            try {
                const response = await fetch(`/notes/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });
                if (!response.ok) throw new Error('Failed to update note');
                showSuccess('Note updated successfully');
                fetchNotes();
            } catch (error) {
                showError(`Error updating note: ${error.message}`);
            }
        }

        // Prompt user to confirm note deletion
        async function deleteNotePrompt(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                deleteNote(id);
            }
        }

        // Delete a note
        async function deleteNote(id) {
            try {
                const response = await fetch(`/notes/${id}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error('Failed to delete note');
                showSuccess('Note deleted successfully');
                fetchNotes();
            } catch (error) {
                showError(`Error deleting note: ${error.message}`);
            }
        }

        // Toggle loading indicator
        function toggleLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Display error message
        function showError(message) {
            document.getElementById('error').textContent = message;
        }

        // Display success message
        function showSuccess(message) {
            document.getElementById('success').textContent = message;
            setTimeout(() => {
                document.getElementById('success').textContent = '';
            }, 3000);
        }

        // Clear error and success messages
        function clearMessages() {
            document.getElementById('error').textContent = '';
            document.getElementById('success').textContent = '';
        }
    </script>
</body>
</html>
